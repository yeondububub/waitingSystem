spring:
  application:
    name: webflux
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 9090

scheduler:
  enabled: true
  max-allow-user-count: 1000

queue:
  token:
    secret-salt: "my-secure-unique-salt-key-9999!"
    val-seconds: 300